<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>校园跳蚤市场</title>
  <style>
    :root {
      --ink: #1a2b2b;
      --paper: #f7f4ec;
      --accent: #e07a3f;
      --accent-dark: #c4622c;
      --card: #ffffff;
      --muted: #6b7878;
      --line: #e2ddd0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: var(--paper);
      color: var(--ink);
      line-height: 1.6;
    }

    header {
      background: var(--ink);
      color: var(--paper);
      padding: 28px 24px;
    }
    header .wrap { max-width: 960px; margin: 0 auto; }
    header h1 { font-size: 26px; letter-spacing: 1px; }
    header p { color: #b9c4c4; margin-top: 4px; font-size: 14px; }

    main { max-width: 960px; margin: 0 auto; padding: 24px; }

    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .toolbar input {
      flex: 1;
      min-width: 200px;
      padding: 10px 14px;
      border: 1.5px solid var(--line);
      border-radius: 8px;
      font-size: 15px;
      background: var(--card);
    }
    .toolbar input:focus { outline: 2px solid var(--accent); border-color: transparent; }
    .toolbar button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .toolbar button:hover { background: var(--accent-dark); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 18px;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(26, 43, 43, 0.08);
    }
    .card .cat {
      display: inline-block;
      font-size: 12px;
      color: var(--accent-dark);
      background: #f6e7dc;
      padding: 2px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
    }
    .card h3 { font-size: 17px; margin-bottom: 6px; }
    .card .desc { color: var(--muted); font-size: 14px; margin-bottom: 12px; }
    .card .price { font-size: 20px; font-weight: 700; color: var(--accent); }
    .card .price small { font-size: 13px; color: var(--muted); font-weight: 400; }

    .empty { text-align: center; color: var(--muted); padding: 60px 0; }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 30px;
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>🎒 校园跳蚤市场</h1>
      <p>把闲置传给需要的人</p>
    </div>
  </header>

  <main>
    <div class="toolbar">
      <input id="searchInput" type="text" placeholder="搜索商品，比如「自行车」「教材」…" />
      <button onclick="search()">搜索</button>
      <button onclick="loadAll()" style="background:#5a6868;">显示全部</button>
    </div>

    <div id="grid" class="grid"></div>
    <div id="empty" class="empty" style="display:none;">没有找到相关商品</div>
  </main>

  <footer>
    我的第一个全栈项目 · 用 Node.js + Express 驱动
  </footer>

  <script>
    // 后端地址（后端启动后跑在 3000 端口）
    const API = "http://localhost:3000/api/products";

    // 渲染商品卡片
    function render(products) {
      const grid = document.getElementById("grid");
      const empty = document.getElementById("empty");
      grid.innerHTML = "";

      if (!products.length) {
        empty.style.display = "block";
        return;
      }
      empty.style.display = "none";

      products.forEach((p) => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <span class="cat">${p.category}</span>
          <h3>${p.title}</h3>
          <p class="desc">${p.description || "暂无描述"}</p>
          <div class="price">¥${p.price} <small>元</small></div>
        `;
        grid.appendChild(card);
      });
    }

    // 加载全部商品
    async function loadAll() {
      document.getElementById("searchInput").value = "";
      try {
        const res = await fetch(API);
        const data = await res.json();
        render(data);
      } catch (err) {
        document.getElementById("grid").innerHTML =
          '<p style="color:#c4622c;">连接后端失败，请确认后端已启动（npm start）。</p>';
      }
    }

    // 搜索商品
    async function search() {
      const keyword = document.getElementById("searchInput").value.trim();
      if (!keyword) return loadAll();
      try {
        const res = await fetch(`${API}?search=${encodeURIComponent(keyword)}`);
        const data = await res.json();
        render(data);
      } catch (err) {
        document.getElementById("grid").innerHTML =
          '<p style="color:#c4622c;">连接后端失败，请确认后端已启动。</p>';
      }
    }

    // 回车也能搜索
    document.getElementById("searchInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") search();
    });

    // 页面打开时自动加载
    loadAll();
  </script>
</body>
</html>
